name: Daily live update

# Re-runs scripts/update.py once a day: pull the latest World Cup results from
# football-data.org, re-condition the forecast, rebuild dashboard.html, and
# commit the refreshed data back to the repo — but only when results changed.

on:
  schedule:
    # 07:00 UTC daily — late enough to capture the previous day's
    # North-American kickoffs (which finish around 05:00 UTC).
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # also runnable on demand from the Actions tab

# Allow the built-in GITHUB_TOKEN to push the regenerated files.
permissions:
  contents: write

# Never let two refreshes overlap.
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pinned subset the update.py chain needs (see requirements-ci.txt for why
          # versions are pinned and why soccerdata is excluded).
          pip install -r requirements-ci.txt
          # Headless Chromium for the FotMob xG / player-of-the-match scrape.
          python -m playwright install --with-deps chromium

      - name: Run live update pipeline
        id: update
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          set -o pipefail
          python scripts/update.py | tee update.log
          # update.py prints "No new results" and rebuilds nothing when the
          # forecast is unchanged — skip the commit on those days.
          if grep -q "No new results" update.log; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          rm -f update.log

      - name: Commit & push refreshed data
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Data/simulated/live_scores.json \
                  Data/simulated/match_details.json \
                  Data/simulated/wc2026_champion_probabilities.csv \
                  Data/simulated/wc2026_bracket_full.csv \
                  Data/simulated/wc2026_bracket_predictions.csv \
                  Data/simulated/wc2026_player_scoring.csv \
                  Data/simulated/.update_state.json \
                  Data/schedule_2026.csv \
                  dashboard.html
          if git diff --cached --quiet; then
            echo "Nothing staged — skipping commit."
          else
            # No [skip ci]: the live site is on Netlify, which redeploys on push
            # and treats [skip ci] as "skip this deploy" — that left dashboard.html
            # stale. This workflow only triggers on schedule/dispatch (never on
            # push), so dropping the tag cannot cause a re-trigger loop.
            git commit -m "live update"
            git push
          fi
